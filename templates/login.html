<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — DiabetCare S.A.</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>DiabetCare S.A.</h1>
      <p class="login-subtitle">Sistema de Gestión Clínica</p>

      {% if error %}
      <div class="flash flash-error">{{ error }}</div>
      {% endif %}

      <form method="post" class="login-form">
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" name="username" required autofocus
                 placeholder="admin, medico o analista">
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required
                 placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary login-btn">Iniciar Sesión</button>
      </form>

      <div class="login-hint">
        <p><strong>Demo:</strong> admin / admin123 · medico / medico123 · analista / analista123</p>
      </div>
    </div>
  </div>
</body>
</html>
